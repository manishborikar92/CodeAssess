<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0FF0C8"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4D7CFF"/>
      <stop offset="100%" stop-color="#1A3A99"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Right-facing Chevron (representing Code / Programming) -->
    <path 
      d="M 121 141 L 231 251 L 121 361" 
      stroke="url(#blueGrad)" 
      stroke-width="72" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
    
    <!-- Overlapping Checkmark (representing Assessment / Evaluation) -->
    <path 
      d="M 191 291 L 271 371 L 391 161" 
      stroke="url(#cyanGrad)" 
      stroke-width="72" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
  </g>
</svg>
